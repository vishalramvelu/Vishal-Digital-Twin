{% extends "base.html" %}

{% block content %}
<div id="root"></div>

<style>
    #root { height: 100vh; }

    .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 820px;
        margin: 0 auto;
        padding: 0 24px;
    }

    /* ── Header ── */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(80, 60, 40, 0.1);
    }
    .header-brand {
        display: flex;
        align-items: baseline;
        gap: 8px;
        cursor: pointer;
    }
    .header-logo {
        font-size: 18px;
        font-weight: 600;
        color: #2c241e;
        letter-spacing: -0.3px;
    }
    .header-logo span {
        color: #a0764e;
    }
    .header-by {
        font-size: 12px;
        color: #a39688;
        font-weight: 400;
        letter-spacing: 0.2px;
    }
    .header-by strong {
        color: #7a6e60;
        font-weight: 500;
    }
    .new-chat-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: 1px solid rgba(80, 60, 40, 0.12);
        border-radius: 8px;
        padding: 6px 12px;
        color: #7a6e60;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s;
    }
    .new-chat-btn:hover {
        background: rgba(80, 60, 40, 0.05);
        color: #5a4e40;
        border-color: rgba(80, 60, 40, 0.2);
    }
    .new-chat-btn svg {
        width: 14px;
        height: 14px;
    }

    /* ── Landing state ── */
    .landing {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding-bottom: 80px;
    }
    .landing h1 {
        font-size: 28px;
        font-weight: 500;
        color: #2c241e;
    }
    .suggestions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        max-width: 560px;
    }
    .suggestion-chip {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(80, 60, 40, 0.1);
        border-radius: 14px;
        padding: 10px 16px;
        font-size: 14px;
        color: #7a6e60;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s;
    }
    .suggestion-chip:hover {
        background: rgba(255, 255, 255, 0.7);
        color: #5a4e40;
        border-color: rgba(80, 60, 40, 0.2);
    }

    /* ── Chat state ── */
    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scrollbar-width: thin;
        scrollbar-color: #d0c4b6 transparent;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #d0c4b6; border-radius: 3px; }

    .msg { max-width: 100%; line-height: 1.6; word-wrap: break-word; }
    .msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, #faf3ea 0%, #fff8f0 100%);
        border: 1px solid rgba(80, 60, 40, 0.1);
        padding: 12px 18px;
        border-radius: 20px 20px 4px 20px;
        max-width: 75%;
        font-size: 15px;
        white-space: pre-wrap;
        color: #2c241e;
        box-shadow: 0 1px 4px rgba(80, 60, 40, 0.08);
        animation: msg-in 0.25s ease-out;
    }
    @keyframes msg-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .msg-assistant {
        align-self: flex-start;
        padding: 4px 0;
        font-size: 15px;
        color: #4a4038;
    }

    /* ── Markdown prose ── */
    .msg-assistant p { margin: 0 0 12px; }
    .msg-assistant p:last-child { margin-bottom: 0; }
    .msg-assistant h1, .msg-assistant h2, .msg-assistant h3,
    .msg-assistant h4, .msg-assistant h5, .msg-assistant h6 {
        color: #2c241e;
        margin: 20px 0 8px;
        line-height: 1.3;
    }
    .msg-assistant h1:first-child, .msg-assistant h2:first-child,
    .msg-assistant h3:first-child { margin-top: 0; }
    .msg-assistant h1 { font-size: 1.4em; }
    .msg-assistant h2 { font-size: 1.25em; }
    .msg-assistant h3 { font-size: 1.1em; }
    .msg-assistant strong { color: #2c241e; }
    .msg-assistant a { color: #a0764e; text-decoration: none; }
    .msg-assistant a:hover { text-decoration: underline; }
    .msg-assistant ul, .msg-assistant ol {
        margin: 8px 0 12px;
        padding-left: 24px;
    }
    .msg-assistant li { margin: 4px 0; }
    .msg-assistant li > p { margin: 0; }
    .msg-assistant blockquote {
        border-left: 3px solid #d0c4b6;
        padding: 4px 0 4px 14px;
        margin: 8px 0 12px;
        color: #8a7e70;
    }
    .msg-assistant hr {
        border: none;
        border-top: 1px solid #d8cfc4;
        margin: 16px 0;
    }
    .msg-assistant code {
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        font-size: 0.88em;
        background: rgba(80, 60, 40, 0.07);
        padding: 2px 6px;
        border-radius: 4px;
        color: #8b5e3c;
    }
    .msg-assistant pre {
        background: #faf3ea;
        border: 1px solid #e4dbd0;
        border-radius: 8px;
        padding: 14px 16px;
        margin: 10px 0 14px;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: #d0c4b6 transparent;
    }
    .msg-assistant pre::-webkit-scrollbar { height: 4px; }
    .msg-assistant pre::-webkit-scrollbar-thumb { background: #d0c4b6; border-radius: 2px; }
    .msg-assistant pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        color: #5a4e40;
        font-size: 13px;
        line-height: 1.5;
    }
    .msg-assistant table {
        border-collapse: collapse;
        margin: 10px 0 14px;
        width: 100%;
        font-size: 14px;
    }
    .msg-assistant th, .msg-assistant td {
        border: 1px solid #d8cfc4;
        padding: 8px 12px;
        text-align: left;
    }
    .msg-assistant th {
        background: rgba(80, 60, 40, 0.05);
        color: #2c241e;
        font-weight: 600;
    }
    .msg-assistant img { max-width: 100%; border-radius: 6px; }

    /* ── Tool call pills ── */
    .tool-calls-group {
        align-self: flex-start;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .tool-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(80, 60, 40, 0.1);
        border-radius: 100px;
        padding: 5px 12px 5px 10px;
        font-size: 12px;
        color: #7a6e60;
        transition: background 0.15s;
    }
    .tool-pill-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 10px;
        line-height: 1;
    }
    .tool-pill-icon.success {
        background: rgba(90, 140, 70, 0.12);
        color: #5a8c46;
    }
    .tool-pill-icon.fail {
        background: rgba(190, 70, 50, 0.12);
        color: #be4632;
    }
    .tool-pill-name {
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        font-size: 12px;
        letter-spacing: -0.2px;
    }

    /* ── Input bar ── */
    .input-area {
        padding: 16px 0 24px;
        flex-shrink: 0;
    }
    .input-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #faf3ea;
        border: 1px solid #d8cfc4;
        border-radius: 24px;
        padding: 8px 12px 8px 20px;
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        transition: border-color 0.2s;
    }
    .input-bar:focus-within { border-color: #a0764e; }
    .input-bar.full-width { max-width: 100%; }

    .input-bar input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #3b322a;
        font-size: 15px;
        font-family: inherit;
    }
    .input-bar input::placeholder { color: #a39688; }

    .send-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: #a0764e;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.2s;
    }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn:not(:disabled):hover { opacity: 0.85; }
    .send-btn svg { width: 16px; height: 16px; }

    /* ── Thinking indicator ── */
    .thinking-indicator {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
    }
    .thinking-bar {
        width: 24px;
        height: 24px;
        position: relative;
    }
    .thinking-bar span {
        position: absolute;
        bottom: 4px;
        width: 3px;
        background: #a0764e;
        border-radius: 2px;
        animation: eq 1.2s ease-in-out infinite;
    }
    .thinking-bar span:nth-child(1) { left: 3px; height: 8px; animation-delay: 0s; }
    .thinking-bar span:nth-child(2) { left: 8px; height: 14px; animation-delay: 0.15s; }
    .thinking-bar span:nth-child(3) { left: 13px; height: 10px; animation-delay: 0.3s; }
    .thinking-bar span:nth-child(4) { left: 18px; height: 6px; animation-delay: 0.45s; }
    @keyframes eq {
        0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
        50% { transform: scaleY(1); opacity: 1; }
    }
    .thinking-text {
        font-size: 13px;
        color: #a39688;
        animation: fade-text 2s ease-in-out infinite;
    }
    @keyframes fade-text {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
    }

    /* ── Token badge ── */
    .token-badge {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #faf3ea;
        opacity: 0.9;
        border: 1px solid rgba(80, 60, 40, 0.1);
        border-radius: 20px;
        padding: 6px 14px;
        cursor: pointer;
        transition: all 0.2s;
        z-index: 100;
        user-select: none;
    }
    .token-badge:hover { opacity: 1; background: #fff8f0; }
    .token-badge-summary {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #7a6e60;
    }
    .token-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #a0764e;
        flex-shrink: 0;
    }
    .token-dot.active {
        animation: pulse-dot 1s infinite;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }
    .token-detail {
        padding-top: 8px;
        margin-top: 8px;
        border-top: 1px solid #e4dbd0;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        color: #a39688;
    }
    .token-detail-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
    }
    .token-detail-val { color: #5a4e40; }
</style>

<script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    marked.setOptions({ breaks: true, gfm: true });

    function Markdown({ content }) {
        const html = useMemo(() => marked.parse(content || ""), [content]);
        return React.createElement("div", { dangerouslySetInnerHTML: { __html: html } });
    }

    function Header({ onNewChat, showNewChat }) {
        return (
            <div className="header">
                <div className="header-brand" onClick={onNewChat}>
                    <div className="header-logo"><span>Vishal's</span> Twin</div>
                    <span className="header-by">— by <strong>Vishal</strong></span>
                </div>
                {showNewChat && (
                    <button className="new-chat-btn" onClick={onNewChat}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        New chat
                    </button>
                )}
            </div>
        );
    }

    const SendIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
    );

    const ThinkingIndicator = () => (
        <div className="thinking-indicator">
            <div className="thinking-bar">
                <span /><span /><span /><span />
            </div>
            <span className="thinking-text">Thinking</span>
        </div>
    );

    function formatTokens(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
        if (n >= 1000) return (n / 1000).toFixed(1) + "k";
        return String(n);
    }

    function isToolSuccess(step) {
        if (step.result == null) return true;
        const r = typeof step.result === "string" ? step.result.toLowerCase() : "";
        if (r.includes("error") || r.includes("failed") || r.includes("exception")) return false;
        return true;
    }

    function ToolPill({ step }) {
        const success = isToolSuccess(step);
        return (
            <div className="tool-pill">
                <span className={`tool-pill-icon ${success ? "success" : "fail"}`}>
                    {success ? "\u2713" : "\u2717"}
                </span>
                <span className="tool-pill-name">{step.name}</span>
            </div>
        );
    }

    function ToolCallGroup({ steps }) {
        return (
            <div className="tool-calls-group">
                {steps.map((step, i) => <ToolPill key={i} step={step} />)}
            </div>
        );
    }

    function TokenBadge({ usage, loading }) {
        const [expanded, setExpanded] = useState(false);
        if (usage.total_tokens === 0) return null;

        return (
            <div className="token-badge" onClick={() => setExpanded(e => !e)}>
                <div className="token-badge-summary">
                    <span className={`token-dot${loading ? " active" : ""}`} />
                    <span>{formatTokens(usage.total_tokens)} tokens</span>
                </div>
                {expanded && (
                    <div className="token-detail">
                        <div className="token-detail-row">
                            <span>Prompt</span>
                            <span className="token-detail-val">{usage.prompt_tokens.toLocaleString()}</span>
                        </div>
                        <div className="token-detail-row">
                            <span>Completion</span>
                            <span className="token-detail-val">{usage.completion_tokens.toLocaleString()}</span>
                        </div>
                        <div className="token-detail-row">
                            <span>Total</span>
                            <span className="token-detail-val">{usage.total_tokens.toLocaleString()}</span>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    function App() {
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState("");
        const [loading, setLoading] = useState(false);
        const [sessionUsage, setSessionUsage] = useState({ prompt_tokens: 0, completion_tokens: 0, total_tokens: 0 });
        const [threadId, setThreadId] = useState(() => crypto.randomUUID());
        const messagesEnd = useRef(null);
        const inputRef = useRef(null);

        const inChat = messages.length > 0;

        useEffect(() => {
            if (messagesEnd.current) {
                messagesEnd.current.scrollIntoView({ behavior: "smooth" });
            }
        }, [messages, loading]);

        useEffect(() => { inputRef.current?.focus(); }, []);

        function newChat() {
            setMessages([]);
            setInput("");
            setLoading(false);
            setThreadId(crypto.randomUUID());
        }

        async function send() {
            const text = input.trim();
            if (!text || loading) return;

            const userMsg = { role: "user", content: text };
            setMessages(prev => [...prev, userMsg]);
            setInput("");
            setLoading(true);

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, thread_id: threadId }),
                });
                const data = await res.json();
                if (data.error) {
                    setMessages(prev => [...prev, { role: "assistant", content: `Error: ${data.error}` }]);
                } else {
                    const newEntries = [];
                    if (data.steps && data.steps.length > 0) {
                        for (const step of data.steps) {
                            newEntries.push({ role: "tool_call", step });
                        }
                    }
                    if (data.reply) {
                        newEntries.push({ role: "assistant", content: data.reply });
                    }
                    setMessages(prev => [...prev, ...newEntries]);

                    if (data.usage) {
                        setSessionUsage(prev => ({
                            prompt_tokens: prev.prompt_tokens + data.usage.prompt_tokens,
                            completion_tokens: prev.completion_tokens + data.usage.completion_tokens,
                            total_tokens: prev.total_tokens + data.usage.total_tokens,
                        }));
                    }
                }
            } catch (err) {
                setMessages(prev => [...prev, { role: "assistant", content: "Something went wrong. Please try again." }]);
            } finally {
                setLoading(false);
            }
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        const inputBar = (
            <div className={`input-bar${inChat ? " full-width" : ""}`}>
                <input
                    ref={inputRef}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKey}
                    placeholder="Message Vishal's Twin..."
                    disabled={loading}
                />
                <button className="send-btn" onClick={send} disabled={!input.trim() || loading}>
                    <SendIcon />
                </button>
            </div>
        );

        if (!inChat) {
            return (
                <div className="app">
                    <Header onNewChat={newChat} showNewChat={false} />
                    <div className="landing">
                        <h1>What can I help with?</h1>
                        <div className="suggestions">
                            {[
                                "What's on your calendar next week?",
                                "Tell me about your React experiences",
                                "What projects are you working on?",
                                "Walk me through your tech stack",
                            ].map((q, i) => (
                                <button key={i} className="suggestion-chip" onClick={() => { setInput(q); }}>
                                    {q}
                                </button>
                            ))}
                        </div>
                        {inputBar}
                    </div>
                    <TokenBadge usage={sessionUsage} loading={loading} />
                </div>
            );
        }

        return (
            <div className="app">
                <Header onNewChat={newChat} showNewChat={true} />
                <div className="messages">
                    {(() => {
                        const elements = [];
                        let i = 0;
                        while (i < messages.length) {
                            const m = messages[i];
                            if (m.role === "tool_call") {
                                const group = [];
                                while (i < messages.length && messages[i].role === "tool_call") {
                                    group.push(messages[i].step);
                                    i++;
                                }
                                elements.push(<ToolCallGroup key={`tg-${i}`} steps={group} />);
                            } else {
                                elements.push(
                                    m.role === "assistant"
                                        ? <div key={i} className="msg msg-assistant"><Markdown content={m.content} /></div>
                                        : <div key={i} className={`msg msg-${m.role}`}>{m.content}</div>
                                );
                                i++;
                            }
                        }
                        return elements;
                    })()}
                    {loading && <ThinkingIndicator />}
                    <div ref={messagesEnd} />
                </div>
                <div className="input-area">
                    {inputBar}
                </div>
                <TokenBadge usage={sessionUsage} loading={loading} />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>
{% endblock %}
